pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,cjs,mjs}"
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,cjs,mjs,json,md,yml,yaml}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    verify:
      run: bun run typecheck && bun run lint && bun run test
