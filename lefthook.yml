pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,cjs,mjs}"
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,cjs,mjs,json,md,yml,yaml}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
    lint:
      run: bun run lint
    format:
      run: bun run format:check
    test:
      run: bun run test
    coverage:
      run: bun run test:coverage
    banned-vocab:
      run: bun run banned-vocab
    ban-bun-globals:
      run: bun run ban-bun-globals
    boundary-check:
      run: bun run boundary-check
    wiki-drift:
      run: bun run wiki-drift
    examples-check:
      run: bun run examples-check
