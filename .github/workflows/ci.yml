name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  ci:
    name: "Typecheck / Lint / Format / Test / Audit"
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: ["22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test (canonical node --test runner)
        run: bun run test

      - name: Coverage gate
        run: bun run test:coverage

      - name: Security audit
        run: bun audit --audit-level=high

      - name: Banned vocabulary scan
        run: bun run banned-vocab

      - name: Ban Bun globals scan
        run: bun run ban-bun-globals

      - name: Extensibility boundary check
        run: bun run boundary-check

      - name: Wiki drift check
        run: bun run wiki-drift

      - name: Examples parity check
        run: bun run examples-check

  backpressure:
    name: "Backpressure orchestrator"
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: All upstream gates passed
        run: |
          echo "backpressure checkpoint passed: typecheck, lint, format,"
          echo "test, coverage, audit, banned-vocab, boundary-check,"
          echo "wiki-drift, examples-check all green."
